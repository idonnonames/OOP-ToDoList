<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Productivity Hub{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f14;
      --surface:  #141720;
      --surface2: #1c2030;
      --border:   #252a3a;
      --text:     #e8eaf0;
      --muted:    #5a6080;
      --amber:    #f5a623;
      --amber-dim:#a86e12;
      --blue:     #4a9eff;
      --red:      #ff4757;
      --green:    #2ed573;
      --mono:     'DM Mono', monospace;
      --sans:     'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background grid texture ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .ph-wrapper {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ── NAVBAR ── */
    .ph-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .ph-logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--amber);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
    }
    .ph-logo::before { content: '◆ '; }

    .ph-nav-links { display: flex; gap: 8px; }
    .ph-nav-link {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid transparent;
      border-radius: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all .2s;
    }
    .ph-nav-link:hover, .ph-nav-link.active {
      color: var(--text);
      border-color: var(--border);
      background: var(--surface);
    }

    /* ── FLASH MESSAGES ── */
    .flash-area { margin-bottom: 20px; }
    .flash {
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px 16px;
      border-radius: 6px;
      border-left: 3px solid;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideIn .3s ease;
    }
    @keyframes slideIn { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }

    .flash-success { background: rgba(46,213,115,.08); border-color: var(--green); color: var(--green); }
    .flash-danger  { background: rgba(255,71,87,.08);  border-color: var(--red);   color: var(--red); }
    .flash-info    { background: rgba(74,158,255,.08); border-color: var(--blue);  color: var(--blue); }

    .flash-close {
      background: none; border: none; cursor: pointer;
      color: inherit; font-size: 16px; opacity: .6;
    }
    .flash-close:hover { opacity: 1; }

    /* ── DASHBOARD HEADER ── */
    .ph-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .ph-greeting {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .ph-title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--text) 40%, var(--amber));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .ph-date {
      text-align: right;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.8;
    }
    #liveClock { display: block; font-size: 22px; color: var(--text); font-weight: 500; }

    /* ── STAT CARDS ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: transform .2s, border-color .2s;
    }
    .stat-card:hover { transform: translateY(-2px); border-color: var(--amber-dim); }
    .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-pending::after { background: var(--amber); }
    .stat-done::after    { background: var(--green); }
    .stat-focus::after   { background: var(--red); }
    .stat-total::after   { background: var(--blue); }

    .stat-icon { font-size: 20px; margin-bottom: 12px; opacity: .7; }
    .stat-num  { font-size: 36px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .stat-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

    .stat-pending .stat-num { color: var(--amber); }
    .stat-done .stat-num    { color: var(--green); }
    .stat-focus .stat-num   { color: var(--red); }
    .stat-total .stat-num   { color: var(--blue); }

    /* ── MAIN GRID ── */
    .main-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ── PANELS ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .panel-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-amber { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
    .dot-blue  { background: var(--blue);  box-shadow: 0 0 8px var(--blue); }
    .dot-green { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot-red   { background: var(--red);   box-shadow: 0 0 8px var(--red); }

    .panel-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      flex: 1;
    }

    /* ── FILTER TABS ── */
    .filter-tabs { display: flex; gap: 4px; }
    .ftab {
      font-family: var(--mono);
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all .15s;
    }
    .ftab.active, .ftab:hover { background: var(--surface); color: var(--text); border-color: var(--amber-dim); }

    /* ── CREATE FORM ── */
    .create-form { padding: 20px; display: flex; flex-direction: column; gap: 14px; }

    .ph-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .ph-input:focus { border-color: var(--amber); }
    .ph-input::placeholder { color: var(--muted); }
    .ph-input-sm { padding: 8px 12px; font-size: 13px; }

    .toggle-row { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .toggle-label { flex: 1; }
    .toggle-label input { display: none; }
    .toggle-pill {
      display: block;
      text-align: center;
      padding: 9px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 1px;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .toggle-label input:checked + .toggle-pill {
      background: var(--amber);
      color: #000;
      font-weight: 500;
    }

    .priority-fields { display: flex; flex-direction: column; gap: 10px; animation: fadeIn .2s; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    .field-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }

    .priority-row { display: flex; gap: 8px; }
    .pri-btn {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 6px;
      text-align: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .pri-btn input { display: none; }
    .pri-btn.active, .pri-btn:hover { border-color: var(--amber); color: var(--text); background: rgba(245,166,35,.08); }

    .ph-btn {
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .5px;
    }
    .ph-btn-primary {
      background: var(--amber);
      color: #000;
    }
    .ph-btn-primary:hover { background: #ffc04a; transform: translateY(-1px); }
    .ph-btn-danger { background: var(--red); color: #fff; }
    .ph-btn-danger:hover { background: #ff6b7a; }
    .ph-btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .ph-btn-ghost:hover { color: var(--text); border-color: var(--amber); }

    /* ── TASK LIST ── */
    .task-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: rgba(255,255,255,.02); }
    .task-item.task-overdue { border-left: 2px solid var(--red); }

    .task-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }

    .task-check {
      width: 20px; height: 20px;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; flex-shrink: 0;
      color: var(--green);
    }
    .task-check.checked { background: rgba(46,213,115,.1); border-color: var(--green); }

    .task-info { min-width: 0; }
    .task-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-done .task-name { text-decoration: line-through; color: var(--muted); }
    .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }

    .meta-chip {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
    }
    .pri-badge {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 500;
    }
    .pri-high   { background: rgba(255,71,87,.15);   color: var(--red); }
    .pri-medium { background: rgba(245,166,35,.15);  color: var(--amber); }
    .pri-low    { background: rgba(46,213,115,.15);  color: var(--green); }
    .overdue-badge {
      font-family: var(--mono);
      font-size: 9px;
      background: var(--red);
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .task-actions { display: flex; gap: 6px; flex-shrink: 0; margin-left: 12px; }
    .act-btn {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      transition: all .15s;
    }
    .act-btn:hover { color: var(--text); }
    .act-view:hover { border-color: var(--blue);  color: var(--blue); }
    .act-done:hover { border-color: var(--green); color: var(--green); }
    .act-del:hover  { border-color: var(--red);   color: var(--red); }

    .empty-state {
      padding: 48px 20px;
      text-align: center;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
    }
    .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: .4; }

    /* ── TASK DETAIL ── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
      text-transform: uppercase; color: var(--muted);
      text-decoration: none; padding: 8px 14px;
      border: 1px solid var(--border); border-radius: 6px;
      margin-bottom: 24px; transition: all .15s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--amber); }

    .detail-grid { display: grid; grid-template-columns: 1fr 360px; gap: 20px; align-items: start; }
    .detail-header { padding: 24px; border-bottom: 1px solid var(--border); }
    .detail-title { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
    .detail-badges { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .note-card {
      margin: 0 20px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .note-card:first-of-type { margin-top: 16px; }
    .note-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .note-type-badge {
      font-family: var(--mono); font-size: 9px;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted); background: var(--surface2);
      padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border);
    }
    .note-del-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 14px; transition: color .15s;
    }
    .note-del-btn:hover { color: var(--red); }
    .note-text { font-size: 13px; color: #c0c4d0; white-space: pre-wrap; line-height: 1.6; }

    .checklist-item { display: flex; align-items: center; gap: 10px; padding: 5px 0; }
    .cl-toggle { background: none; border: none; cursor: pointer; padding: 0; font-size: 16px; transition: transform .15s; }
    .cl-toggle:hover { transform: scale(1.1); }
    .cl-text { font-size: 13px; color: #c0c4d0; }
    .cl-text.checked { text-decoration: line-through; color: var(--muted); }

    .add-note-form { padding: 16px 20px 20px; border-top: 1px solid var(--border); }
    .add-note-form textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      resize: vertical;
      outline: none;
      transition: border-color .2s;
      min-height: 80px;
    }
    .add-note-form textarea:focus { border-color: var(--amber); }

    /* ── POMODORO TIMER ── */
    .pom-container {
      max-width: 520px;
      margin: 0 auto;
    }
    .pom-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .pom-task-label {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .pom-task-name {
      font-family: var(--sans);
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0;
      text-transform: none;
      margin-top: 2px;
    }

    .pom-clock-area {
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* SVG ring timer */
    .pom-ring-wrap { position: relative; width: 220px; height: 220px; margin-bottom: 28px; }
    .pom-ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .pom-ring-bg { fill: none; stroke: var(--surface2); stroke-width: 6; }
    .pom-ring-progress { fill: none; stroke: var(--amber); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
    .pom-ring-progress.pom-warning { stroke: var(--red); }
    .pom-time-display {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .pom-time {
      font-family: var(--mono);
      font-size: 48px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--text);
      line-height: 1;
    }
    .pom-phase {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    .pom-controls { display: flex; gap: 12px; }
    .pom-ctrl-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .pom-ctrl-btn:hover { border-color: var(--amber); color: var(--amber); }
    .pom-ctrl-btn.pom-play {
      width: 60px; height: 60px;
      background: var(--amber);
      border-color: var(--amber);
      color: #000;
      font-size: 22px;
    }
    .pom-ctrl-btn.pom-play:hover { background: #ffc04a; transform: scale(1.05); }

    /* Customizer panel */
    .pom-customizer {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .customizer-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .customizer-body { padding: 20px; }

    .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
    .preset-btn {
      padding: 10px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      text-align: center;
      cursor: pointer;
      transition: all .15s;
    }
    .preset-btn .preset-name { display: block; color: var(--text); font-size: 12px; margin-bottom: 2px; }
    .preset-btn:hover, .preset-btn.active { border-color: var(--amber); background: rgba(245,166,35,.06); }

    .slider-group { margin-bottom: 16px; }
    .slider-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .slider-label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .slider-val {
      font-family: var(--mono); font-size: 13px; font-weight: 500;
      color: var(--amber); min-width: 40px; text-align: right;
    }
    input[type=range] {
      width: 100%; -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 2px;
      background: var(--surface2);
      outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--amber); cursor: pointer;
      transition: transform .15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    .sound-row { display: flex; gap: 8px; }
    .sound-opt {
      flex: 1; padding: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: var(--mono); font-size: 10px;
      text-align: center; cursor: pointer;
      transition: all .15s; letter-spacing: 1px; text-transform: uppercase;
    }
    .sound-opt input { display: none; }
    .sound-opt:has(input:checked), .sound-opt.active { border-color: var(--amber); color: var(--text); }

    .pom-log-list { padding: 0 20px 20px; }
    .log-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      font-family: var(--mono); font-size: 11px;
    }
    .log-item:last-child { border-bottom: none; }
    .log-status-done   { color: var(--green); }
    .log-status-cancel { color: var(--muted); }

    /* Responsive */
    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .ph-title { font-size: 26px; }
      .ph-header { flex-direction: column; align-items: flex-start; gap: 12px; }
    }
  </style>
</head>
<body>
  <div class="ph-wrapper">
    <nav class="ph-nav">
      <a href="{{ url_for('index') }}" class="ph-logo">Productivity Hub</a>
      <div class="ph-nav-links">
        <a href="{{ url_for('index') }}" class="ph-nav-link {% if request.endpoint == 'index' %}active{% endif %}">Dashboard</a>
      </div>
    </nav>

    <div class="flash-area">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
          <div class="flash flash-{{ category }}">
            <span>{{ msg }}</span>
            <button class="flash-close" onclick="this.parentElement.remove()">×</button>
          </div>
        {% endfor %}
      {% endwith %}
    </div>

    {% block content %}{% endblock %}
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
